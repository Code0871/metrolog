services:
  service_park_db:
    image: postgres:17
    container_name: service_park_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - service_park_db_volume:/var/lib/postgresql/data
      - ./backup:/backup
    ports:
      - "5433:5432"

volumes:
  service_park_db_volume: